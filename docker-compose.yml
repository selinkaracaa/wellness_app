services:
  db:
    image: postgres:16-alpine
    container_name: wellness_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wellness
      POSTGRES_PASSWORD: wellness
      POSTGRES_DB: wellness
    ports:
      - "5432:5432"
    volumes:
      - wellness_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wellness -d wellness"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  wellness_pgdata:
